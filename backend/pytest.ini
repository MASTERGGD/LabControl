[pytest]
# LabControl — configuracion de pytest para tests de integracion
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# No generar .pyc (evita conflictos de cache en NTFS/WSL2)
# PYTHONDONTWRITEBYTECODE se establece en conftest.py para no depender de pytest-env
addopts = -p no:cacheprovider -v

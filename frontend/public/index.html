<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LabControl — UTECAN</title>

    <!-- ── PWA: manifest + theme ──────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LabControl" />
    <meta name="application-name" content="LabControl" />
    <meta name="msapplication-TileColor" content="#0f172a" />

    <!-- ── Íconos ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon"      sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- ── SEO / descripción ──────────────────────────────────────────────── -->
    <meta name="description" content="Sistema de control y reservación de laboratorios — UTECAN" />

    <!-- Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      /* ── Base ─────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        /* ── Paleta base (Modo Noche) ────────────────────────────────────── */
        --bg:           #0f172a;
        --surface:      #1e293b;
        --surface-2:    #0d1b2e;
        --border:       #334155;
        --border-light: rgba(255,255,255,0.07);
        --blue:         #3b82f6;
        --emerald:      #10b981;
        --text:         #f1f5f9;
        --text-muted:   #94a3b8;
        --glass-bg:     rgba(30,41,59,0.6);
        --glass-border: rgba(255,255,255,0.08);

        /* Semantic accent aliases */
        --accent-primary:      #3b82f6;
        --accent-primary-dark: #2563eb;
        --accent-primary-glow: rgba(59,130,246,0.38);
        --accent-secondary:    #DDC9A3;
        --accent-success:      #10b981;
        --accent-success-dark: #059669;
        --accent-success-glow: rgba(16,185,129,0.38);

        /* ── Variables de estructura de layout ──────────────────────────── */
        --layout-bg:         #0f172a;
        --sidebar-from:      #0d1b2e;
        --sidebar-to:        #0a1628;
        --sidebar-border:    rgba(255,255,255,0.06);
        --topbar-bg:         rgba(15,23,42,0.8);
        --topbar-border:     rgba(255,255,255,0.06);
        --breadcrumb-bg:     rgba(15,23,42,0.5);
        --breadcrumb-border: rgba(255,255,255,0.04);
        --logo-bg:           linear-gradient(135deg,#3b82f6,#6366f1);

        /* ── Variables de navegación ─────────────────────────────────────── */
        --nav-text:              #94a3b8;
        --nav-hover-bg:          rgba(255,255,255,0.05);
        --nav-toggle-bg:         rgba(255,255,255,0.04);
        --nav-toggle-color:      #64748b;
        --user-name-color:       #cbd5e1;
        --user-sep:              rgba(255,255,255,0.1);
        --topbar-icon-color:     #94a3b8;
        --topbar-hover-bg:       rgba(255,255,255,0.05);
        --main-text:             #f1f5f9;
        --sidebar-subtitle:      #475569;

        /* ── Tooltip ────────────────────────────────────────────────────── */
        --tooltip-bg:     rgba(30,41,59,0.97);
        --tooltip-border: rgba(255,255,255,0.1);
        --tooltip-text:   #e2e8f0;
        --tooltip-arrow:  rgba(30,41,59,0.97);

        /* ── Inputs ──────────────────────────────────────────────────────── */
        --input-bg:               rgba(15,23,42,0.7);
        --input-bg-open:          rgba(15,23,42,0.85);
        --input-border-color:     #334155;
        --input-color:            #f1f5f9;
        --input-placeholder-color:#475569;

        /* ── Dropdowns / Select ──────────────────────────────────────────── */
        --dropdown-bg:            rgba(15,23,42,0.97);
        --dropdown-border:        rgba(255,255,255,0.10);
        --dropdown-row-border:    rgba(255,255,255,0.04);
        --dropdown-accent:        #3b82f6;
        --dropdown-active-bg:     rgba(59,130,246,0.18);
        --dropdown-selected-bg:   rgba(59,130,246,0.10);
        --dropdown-text:          #cbd5e1;
        --dropdown-text-active:   #ffffff;
        --dropdown-text-selected: #93c5fd;
        --dropdown-text-empty:    #64748b;
        --dropdown-chevron:       #64748b;
      }

      /* ══════════════════════════════════════════════════════════════════════
         Tema GobMX-Día — paleta Pantone oficial Gobierno de México
         Modo claro con sidebar guinda institucional.
         Clase .theme-gobmx aplicada al <body>
      ══════════════════════════════════════════════════════════════════════ */
      body.theme-gobmx {
        /* ── Pantone oficiales ───────────────────────────────────────────── */
        --blue:    #9F2241;   /* Pantone 7420C — Guinda */
        --emerald: #235B4E;   /* Pantone 626C  — Verde  */

        --accent-primary:      #9F2241;
        --accent-primary-dark: #7a1932;
        --accent-primary-glow: rgba(159,34,65,0.22);
        --accent-secondary:    #DDC9A3;   /* Pantone 468C — Dorado */
        --accent-success:      #235B4E;   /* Pantone 626C — Verde  */
        --accent-success-dark: #1a4439;
        --accent-success-glow: rgba(35,91,78,0.28);

        /* ── Colores base (modo claro) ────────────────────────────────────── */
        --bg:           #F5F0E8;
        --surface:      #ffffff;
        --surface-2:    #F0EAE0;
        --border:       #DDD5C4;
        --border-light: rgba(221,201,163,0.25);
        --text:         #1C1917;
        --text-muted:   #98989A;   /* Pantone CG7 — Gris */
        --glass-bg:     rgba(255,255,255,0.88);
        --glass-border: rgba(159,34,65,0.1);

        /* ── Layout estructura ───────────────────────────────────────────── */
        --layout-bg:         #F5F0E8;
        --sidebar-from:      #9F2241;
        --sidebar-to:        #7a1932;
        --sidebar-border:    rgba(159,34,65,0.25);
        --topbar-bg:         rgba(255,255,255,0.97);
        --topbar-border:     rgba(221,201,163,0.35);
        --breadcrumb-bg:     #F0EAE0;
        --breadcrumb-border: rgba(221,201,163,0.3);
        --logo-bg:           linear-gradient(135deg,#9F2241,#c94067);

        /* ── Navegación ─────────────────────────────────────────────────── */
        --nav-text:              rgba(255,255,255,0.72);
        --nav-hover-bg:          rgba(255,255,255,0.12);
        --nav-toggle-bg:         rgba(255,255,255,0.15);
        --nav-toggle-color:      rgba(255,255,255,0.75);
        --user-name-color:       #1C1917;
        --user-sep:              rgba(221,201,163,0.4);
        --topbar-icon-color:     #6b7280;
        --topbar-hover-bg:       rgba(159,34,65,0.06);
        --main-text:             #1C1917;
        --sidebar-subtitle:      rgba(255,255,255,0.45);

        /* ── Tooltip ────────────────────────────────────────────────────── */
        --tooltip-bg:     #ffffff;
        --tooltip-border: rgba(159,34,65,0.18);
        --tooltip-text:   #1C1917;
        --tooltip-arrow:  #ffffff;

        /* ── Inputs ──────────────────────────────────────────────────────── */
        --input-bg:               #ffffff;
        --input-bg-open:          #ffffff;
        --input-border-color:     #DDD5C4;
        --input-color:            #1C1917;
        --input-placeholder-color:#98989A;

        /* ── Dropdowns / Select ──────────────────────────────────────────── */
        --dropdown-bg:            #ffffff;
        --dropdown-border:        rgba(159,34,65,0.15);
        --dropdown-row-border:    rgba(221,201,163,0.2);
        --dropdown-accent:        #9F2241;
        --dropdown-active-bg:     rgba(159,34,65,0.08);
        --dropdown-selected-bg:   rgba(159,34,65,0.05);
        --dropdown-text:          #374151;
        --dropdown-text-active:   #9F2241;
        --dropdown-text-selected: #9F2241;
        --dropdown-text-empty:    #98989A;
        --dropdown-chevron:       #9F2241;
      }

      html, body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      body { margin: 0; background: var(--bg); color: var(--text); }

      /* ══════════════════════════════════════════════════════════════════════
         GobMX-Día: overrides de clases estructurales
      ══════════════════════════════════════════════════════════════════════ */

      /* Glass cards → fondo blanco/crema */
      body.theme-gobmx .glass {
        background: rgba(255,255,255,0.90) !important;
        border-color: rgba(159,34,65,0.1) !important;
      }
      body.theme-gobmx .glass-sm {
        background: rgba(255,255,255,0.82) !important;
        border-color: rgba(159,34,65,0.1) !important;
      }
      body.theme-gobmx .glass-dark {
        background: rgba(240,234,224,0.94) !important;
        border-color: rgba(159,34,65,0.1) !important;
      }

      /* Inputs */
      body.theme-gobmx .input-dark {
        background: var(--input-bg) !important;
        border-color: var(--input-border-color) !important;
        color: var(--input-color) !important;
      }
      body.theme-gobmx .input-dark::placeholder {
        color: var(--input-placeholder-color) !important;
      }
      body.theme-gobmx .input-dark:focus {
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 0 3px var(--accent-primary-glow) !important;
      }

      /* Nav items — texto blanco sobre sidebar guinda */
      body.theme-gobmx .nav-item {
        color: rgba(255,255,255,0.72) !important;
        border-left-color: transparent !important;
      }
      body.theme-gobmx .nav-item:hover {
        background: rgba(255,255,255,0.13) !important;
        color: #ffffff !important;
      }
      body.theme-gobmx .nav-active {
        background: linear-gradient(90deg,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0.06) 100%) !important;
        border-left-color: #DDC9A3 !important;
        color: #ffffff !important;
      }

      /* Topbar — texto oscuro sobre fondo blanco */
      body.theme-gobmx header button,
      body.theme-gobmx header a { color: var(--topbar-icon-color); }
      body.theme-gobmx header button:hover,
      body.theme-gobmx header a:hover { color: var(--main-text) !important; }
      body.theme-gobmx header .text-slate-300,
      body.theme-gobmx header .text-slate-400 { color: var(--topbar-icon-color) !important; }
      body.theme-gobmx header .border-white\/10 { border-color: var(--user-sep) !important; }

      /* Sidebar — textos sobre fondo guinda */
      body.theme-gobmx aside .text-slate-400,
      body.theme-gobmx aside .text-slate-500 { color: rgba(255,255,255,0.55) !important; }
      body.theme-gobmx aside .text-white { color: #ffffff !important; }

      /* Main content — texto oscuro */
      body.theme-gobmx main { color: var(--main-text); }
      body.theme-gobmx main .text-white { color: var(--main-text) !important; }
      body.theme-gobmx main .text-slate-300 { color: #374151 !important; }
      body.theme-gobmx main .text-slate-400 { color: #6b7280 !important; }
      body.theme-gobmx main .text-slate-500 { color: #9ca3af !important; }

      /* Tables */
      body.theme-gobmx table thead th,
      body.theme-gobmx table thead td { color: #6b7280 !important; }
      body.theme-gobmx table tbody tr { border-color: rgba(221,201,163,0.2) !important; }
      body.theme-gobmx table tbody td { color: #1C1917; }

      /* Modales */
      body.theme-gobmx .fixed.inset-0 .glass,
      body.theme-gobmx .fixed.inset-0 .glass-sm { box-shadow: 0 20px 60px rgba(159,34,65,0.12); }

      /* Breadcrumb */
      body.theme-gobmx nav .text-slate-500,
      body.theme-gobmx nav .text-slate-600 { color: #9ca3af !important; }
      body.theme-gobmx nav .text-slate-300 { color: #374151 !important; }
      body.theme-gobmx nav .text-slate-400 { color: var(--accent-primary) !important; }

      /* Scrollbar claro */
      body.theme-gobmx ::-webkit-scrollbar-thumb { background: #c8b5a0; }
      body.theme-gobmx ::-webkit-scrollbar-thumb:hover { background: #a89070; }

      /* nav-active override específico para gobmx */
      body.theme-gobmx .nav-active {
        background: linear-gradient(90deg,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0.06) 100%) !important;
      }

      /* ── Glassmorphism card ───────────────────────────────────────────── */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 1rem;
      }
      .glass-sm {
        background: rgba(30,41,59,0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--glass-border);
        border-radius: 0.75rem;
      }
      .glass-dark {
        background: rgba(15,23,42,0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 1rem;
      }

      /* ── Sidebar gradient ─────────────────────────────────────────────── */
      .sidebar-bg {
        background: linear-gradient(180deg, #0d1b2e 0%, #0f172a 100%);
        border-right: 1px solid var(--border-light);
      }

      /* ── Inputs ──────────────────────────────────────────────────────── */
      .input-dark {
        background: rgba(15,23,42,0.7);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 0.75rem;
        padding: 0.625rem 1rem;
        width: 100%;
        outline: none;
        font-family: inherit;
        transition: border-color .15s, box-shadow .15s;
      }
      .input-dark:focus {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--accent-primary-glow);
      }
      .input-dark::placeholder { color: #475569; }

      /* select.input-dark option — eliminado: todos los selects usan SelectDark */

      /* ── Botones primarios ──────────────────────────────────────────── */
      .btn-blue {
        background: var(--accent-primary);
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        padding: 0.625rem 1.25rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, box-shadow .15s, transform .1s;
      }
      .btn-blue:hover  { background: var(--accent-primary-dark); box-shadow: 0 0 18px var(--accent-primary-glow); }
      .btn-blue:active { transform: scale(.97); }
      .btn-blue:disabled { opacity: .5; cursor: not-allowed; }

      .btn-emerald {
        background: var(--accent-success);
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        padding: 0.625rem 1.25rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, box-shadow .15s, transform .1s;
      }
      .btn-emerald:hover  { background: var(--accent-success-dark); box-shadow: 0 0 18px var(--accent-success-glow); }
      .btn-emerald:active { transform: scale(.97); }
      .btn-emerald:disabled { opacity: .5; cursor: not-allowed; }

      .btn-ghost {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        border: 1px solid var(--border-light);
        border-radius: 0.75rem;
        padding: 0.625rem 1.25rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, color .15s;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

      /* ── Scrollbar ───────────────────────────────────────────────────── */
      ::-webkit-scrollbar             { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track       { background: transparent; }
      ::-webkit-scrollbar-thumb       { background: #334155; border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }

      /* ── Animaciones ─────────────────────────────────────────────────── */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .animate-spin { animation: spin 1s linear infinite; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      .animate-pulse { animation: pulse 2s ease-in-out infinite; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeUp { animation: fadeUp .3s ease both; }

      @keyframes disputaPulse {
        0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,.3), 0 0 0 0 rgba(245,158,11,0); }
        50%       { box-shadow: 0 2px 8px rgba(0,0,0,.3), 0 0 0 5px rgba(245,158,11,.35); }
      }
      .slot-disputa { animation: disputaPulse 1.8s ease-in-out infinite; }

      /* ── Nav active glow ─────────────────────────────────────────────── */
      .nav-active {
        background: linear-gradient(90deg, rgba(var(--accent-primary-rgb, 59,130,246),.25) 0%, rgba(var(--accent-primary-rgb, 59,130,246),.08) 100%);
        border-left: 2px solid var(--accent-primary);
        color: #fff;
      }
      /* Hack para que el gradiente funcione con la variable — dos reglas específicas */
      body:not(.theme-gobmx) .nav-active {
        background: linear-gradient(90deg, rgba(59,130,246,.25) 0%, rgba(59,130,246,.08) 100%);
      }
      /* GobMX nav-active: borde dorado + fondo blanco translúcido sobre guinda */
      body.theme-gobmx .nav-active {
        background: linear-gradient(90deg,rgba(255,255,255,0.2) 0%,rgba(255,255,255,0.06) 100%) !important;
        border-left-color: #DDC9A3 !important;
      }
      .nav-item {
        border-left: 2px solid transparent;
        transition: all .15s;
        border-radius: 0 0.75rem 0.75rem 0;
      }
      .nav-item:hover { background: rgba(255,255,255,.05); color: #fff; }

      /* ── Tooltip ─────────────────────────────────────────────────────── */
      [data-tip] { position: relative; }
      [data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        left: 110%;
        top: 50%;
        transform: translateY(-50%);
        background: #1e293b;
        color: #e2e8f0;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        border: 1px solid #334155;
        z-index: 100;
      }

      /* ── Horarios: rayas diagonales para EN_DISPUTA (accesibilidad daltonismo) ── */
      .slot-disputa {
        background: repeating-linear-gradient(
          -45deg,
          rgba(245,158,11,0.15) 0px, rgba(245,158,11,0.15) 3px,
          rgba(120,53,15,0.1)   3px, rgba(120,53,15,0.1)   9px
        );
        border: 1px solid rgba(245,158,11,0.5) !important;
      }
      /* ── Drag-select highlight ─────────────────────────────────────────────── */
      .slot-selecting {
        background: color-mix(in srgb, var(--accent-primary) 30%, transparent) !important;
        border: 1px solid color-mix(in srgb, var(--accent-primary) 70%, transparent) !important;
        outline: 2px solid color-mix(in srgb, var(--accent-primary) 40%, transparent);
      }
      .slot-libre {
        background: color-mix(in srgb, var(--accent-success) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent-success) 30%, transparent);
      }
      .slot-libre:hover {
        background: color-mix(in srgb, var(--accent-success) 22%, transparent);
        cursor: pointer;
      }
      .slot-reservado {
        background: color-mix(in srgb, var(--accent-primary) 18%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent-primary) 40%, transparent);
      }
      .slot-bloqueado {
        background: rgba(139,92,246,0.18);
        border: 1px solid rgba(139,92,246,0.4);
      }
      .slot-inactivo { opacity: 0.25; }
      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateX(-50%) translateY(20px); opacity: 0; }
        to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
      }

      /* ── Safe area insets (notch / home indicator en móvil) ────────────── */
      body {
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ── Service Worker registration ───────────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('[PWA] SW registrado:', reg.scope);

              // Notificar al usuario cuando hay una nueva versión disponible
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Hay actualización disponible — el toast de React lo maneja si quieres
                    window.dispatchEvent(new CustomEvent('pwa-update-available'));
                  }
                });
              });
            })
            .catch(err => console.warn('[PWA] SW error:', err));
        });
      }
    </script>
  </body>
</html>

      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 1rem;
      }
      .glass-sm {
        background: rgba(30,41,59,0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--glass-border);
        border-radius: 0.75rem;
      }
      .glass-dark {
        background: rgba(15,23,42,0.75);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 1rem;
      }

      /* Movimiento sutil para tarjetas del contenido principal */
      .card-lift {
        transition:
          transform .18s ease,
          box-shadow .18s ease,
          border-color .18s ease,
          background-color .18s ease;
        will-change: transform;
      }

      @media (hover: hover) and (pointer: fine) {
        main .glass:not(.no-card-lift):not(.animate-pulse),
        main .glass-sm:not(.no-card-lift):not(.animate-pulse),
        main .card-lift:not(.no-card-lift):not(.animate-pulse) {
          transition:
            transform .18s ease,
            box-shadow .18s ease,
            border-color .18s ease,
            background-color .18s ease;
          will-change: transform;
        }

        main .glass:not(.no-card-lift):not(.animate-pulse):hover,
        main .card-lift:not(.no-card-lift):not(.animate-pulse):hover {
          transform: translateY(-2px);
          box-shadow: 0 18px 42px rgba(15,23,42,0.16);
        }

        main .glass-sm:not(.no-card-lift):not(.animate-pulse):hover {
          transform: translateY(-1px);
          box-shadow: 0 12px 28px rgba(15,23,42,0.12);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .card-lift,
        main .glass,
        main .glass-sm {
          transition: none !important;
        }
        .card-lift:hover,
        main .glass:hover,
        main .glass-sm:hover {
          transform: none !important;
        }
      }

      .input-dark {

        border-radius: 0.75rem;

      body.theme-day .fixed.inset-0 button.bg-emerald-600 *,
      body.theme-day .fixed.inset-0 button.bg-emerald-700 *,
      body.theme-day .fixed.inset-0 button.bg-emerald-800 *,
      body.theme-day .fixed.inset-0 button.bg-emerald-600\/80 *,
      body.theme-day .fixed.inset-0 button.bg-green-500 *,
      body.theme-day .fixed.inset-0 button.bg-green-600 *,
      body.theme-day .fixed.inset-0 button.bg-green-700 *,
      body.theme-day .fixed.inset-0 button.bg-green-800 *,
      body.theme-day .fixed.inset-0 .btn-blue *,

      .btn-ghost {
        background: rgba(255,255,255,0.05);
        color: var(--text-muted);
        border: 1px solid var(--border-light);
        border-radius: 0.75rem;
        padding: 0.625rem 1.25rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, color .15s;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }

      /* â”€â”€ Scrollbar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      ::-webkit-scrollbar             { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track       { background: transparent; }
      ::-webkit-scrollbar-thumb       { background: #334155; border-radius: 6px; }
      ::-webkit-scrollbar-thumb:hover { background: #475569; }

      /* â”€â”€ Animaciones â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .animate-spin { animation: spin 1s linear infinite; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      .animate-pulse { animation: pulse 2s ease-in-out infinite; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeUp { animation: fadeUp .3s ease both; }

      @keyframes disputaPulse {
        0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,.3), 0 0 0 0 rgba(245,158,11,0); }
        50%       { box-shadow: 0 2px 8px rgba(0,0,0,.3), 0 0 0 5px rgba(245,158,11,.35); }
      }
      .slot-disputa { animation: disputaPulse 1.8s ease-in-out infinite; }

      /* â”€â”€ Nav active glow â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .nav-active {
        background: linear-gradient(90deg, rgba(var(--accent-primary-rgb, 59,130,246),.25) 0%, rgba(var(--accent-primary-rgb, 59,130,246),.08) 100%);
        border-left: 2px solid var(--accent-primary);
        color: #fff;
      }
      /* Hack para que el gradiente funcione con la variable â€” dos reglas especÃ­ficas */
      body:not(.theme-day) .nav-active {
        background: linear-gradient(90deg, rgba(59,130,246,.25) 0%, rgba(59,130,246,.08) 100%);
      }
      /* institutional nav-active */
      body.theme-day .nav-active {
        background: linear-gradient(90deg,#007A53 0%,rgba(0,122,83,0.32) 100%) !important;
        border-left-color: #00A36C !important;
        color: #FFFFFF !important;
      }
      .nav-item {
        border-left: 2px solid transparent;
        transition: all .15s;
        border-radius: 0 0.75rem 0.75rem 0;
      }
      .nav-item:hover { background: rgba(255,255,255,.05); color: #fff; }

      /* â”€â”€ Tooltip â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      [data-tip] { position: relative; }
      [data-tip]:hover::after {
        content: attr(data-tip);
        position: absolute;
        left: 110%;
        top: 50%;
        transform: translateY(-50%);
        background: #1e293b;
        color: #e2e8f0;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        border: 1px solid #334155;
        z-index: 100;
      }

      /* â”€â”€ Horarios: rayas diagonales para EN_DISPUTA (accesibilidad daltonismo) â”€â”€ */
      .slot-disputa {
        background: repeating-linear-gradient(
          -45deg,
          rgba(245,158,11,0.15) 0px, rgba(245,158,11,0.15) 3px,
          rgba(120,53,15,0.1)   3px, rgba(120,53,15,0.1)   9px
        );
        border: 1px solid rgba(245,158,11,0.5) !important;
      }
      /* â”€â”€ Drag-select highlight â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      .slot-selecting {
        background: color-mix(in srgb, var(--accent-primary) 30%, transparent) !important;
        border: 1px solid color-mix(in srgb, var(--accent-primary) 70%, transparent) !important;
        outline: 2px solid color-mix(in srgb, var(--accent-primary) 40%, transparent);
      }
      .slot-libre {
        background: color-mix(in srgb, var(--accent-success) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent-success) 30%, transparent);
      }
      .slot-libre:hover {
        background: color-mix(in srgb, var(--accent-success) 22%, transparent);
        cursor: pointer;
      }
      .slot-reservado {
        background: color-mix(in srgb, var(--accent-primary) 18%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent-primary) 40%, transparent);
      }
      .slot-bloqueado {
        background: rgba(139,92,246,0.18);
        border: 1px solid rgba(139,92,246,0.4);
      }
      .slot-inactivo { opacity: 0.25; }
      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateX(-50%) translateY(20px); opacity: 0; }
        to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
      }

      /* â”€â”€ Safe area insets (notch / home indicator en mÃ³vil) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
      body {
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
      }
    </style>
  </head>

    <!-- Limpieza de Service Workers/caches viejos en desarrollo. No registra nada nuevo. -->
    <script>
      (function cleanupDevPwaCache() {
        var isDevHost = ['localhost', '127.0.0.1'].indexOf(window.location.hostname) >= 0
          || window.location.hostname.indexOf('192.168.') === 0;
        if (!isDevHost) return;
        if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
          navigator.serviceWorker.getRegistrations()
            .then(function(regs) { regs.forEach(function(reg) { reg.unregister(); }); })
            .catch(function() {});
        }
        if (window.caches && window.caches.keys) {
          window.caches.keys()
            .then(function(keys) { return Promise.all(keys.map(function(key) { return caches.delete(key); })); })
            .catch(function() {});
        }
      })();
    </script>

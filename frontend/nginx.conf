###############################################################################
# nginx.conf — LabControl UTECAN (Frontend React SPA)
# Sirve el build de producción con security headers y rutas SPA
###############################################################################

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Ocultar versión de nginx ───────────────────────────────────────────────
    server_tokens off;

    # ── Security Headers ───────────────────────────────────────────────────────

    # Evita que el browser adivine el Content-Type
    add_header X-Content-Type-Options  "nosniff"                         always;

    # Previene clickjacking
    add_header X-Frame-Options         "DENY"                            always;

    # Protección XSS en browsers legacy
    add_header X-XSS-Protection        "1; mode=block"                   always;

    # No revelar URL completa como Referer a dominios externos
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Deshabilitar APIs de hardware que la app no necesita
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
                                                                         always;

    # Content Security Policy
    # Permite:
    #   - Scripts: propio + Tailwind CDN + inline (tailwind.config en index.html)
    #   - Estilos: propio + inline (glassmorphism) + Google Fonts
    #   - Fuentes: propio + Google Fonts
    #   - Imágenes: propio + data: (SVG inline, iconos base64)
    #   - Conexiones: propio + WebSockets + API en :8000
    #   - Workers: Service Worker PWA
    #   - frame-ancestors none: equivale a X-Frame-Options DENY
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https: ws: wss: http://localhost:8000; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # No cachear el HTML principal (SPA entry point) — para que siempre
    # descargue la versión más reciente del bundle
    add_header Cache-Control "no-cache, no-store, must-revalidate"       always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml;

    # ── SPA Routing ───────────────────────────────────────────────────────────
    # Todas las rutas que no sean archivos estáticos van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets estáticos (JS/CSS/imágenes del build) ──────────────────────────
    # CRA genera hashes en los nombres de archivo, así que se pueden cachear
    # agresivamente (inmutable = nunca cambian sin cambiar de nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Estos assets no necesitan los security headers del bloque global
        # (ya los hereda si nginx no los sobreescribe)
    }

    # ── Service Worker — nunca cachear ────────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Manifest PWA ──────────────────────────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}

###############################################################################
# docker-compose.prod.yml — LabControl UTECAN (PRODUCCIÓN)
#
# Diferencias respecto al compose de desarrollo:
#   - Frontend: nginx multi-stage build (puerto 80) con security headers
#   - Backend:  APP_ENV=production → activa HSTS en el middleware
#   - No hay volúmenes de hot-reload (código queda dentro del contenedor)
#   - CORS restringido a FRONTEND_URL del .env
#
# Uso:
#   docker-compose -f docker-compose.prod.yml up -d --build
###############################################################################

services:
  backend:
    build: ./backend
    container_name: labcontrol_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # Solo persistir la BD, no el código
    env_file:
      - .env
    environment:
      - APP_ENV=production        # Activa HSTS y upgrade-insecure-requests
    command: sh /app/start.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: prod                # nginx con security headers
    container_name: labcontrol_frontend
    ports:
      - "80:80"                   # Puerto estándar HTTP
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

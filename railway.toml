# railway.toml -- Configuracion de despliegue en Railway
#
# Railway despliega cada servicio de forma independiente.
# El plugin de PostgreSQL de Railway inyecta DATABASE_URL automaticamente.
#
# Pasos para subir:
#   1. Crear proyecto en Railway (railway.app)
#   2. Agregar plugin de PostgreSQL al proyecto
#   3. Conectar el repositorio de GitHub
#   4. Railway detectara este archivo y configurara los dos servicios
#   5. Agregar variables de entorno en Railway dashboard:
#        SECRET_KEY=<genera una clave segura>
#        FRONTEND_URL=https://<tu-dominio-frontend>.railway.app
#        APP_ENV=production
#
# Alternativa manual con Railway CLI:
#   railway up --service backend
#   railway up --service frontend

[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"
dockerfile = "Dockerfile"

  [services.deploy]
  startCommand = "sh /app/start.sh"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
name = "frontend"
source = "frontend"
dockerfile = "Dockerfile"
dockerfileBuildTarget = "prod"

  [services.deploy]
  restartPolicyType = "ON_FAILURE"
